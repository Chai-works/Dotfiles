background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgb(80, 73, 69)
    inner_color = rgb(40, 40, 40)
    font_color = rgb(235, 219, 178)
    fade_on_empty = true
    placeholder_text = 
    hide_input = false
    check_color = rgb(184, 187, 38)
    fail_color = rgb(204, 36, 29)
    fail_text = <i>wrong 💀</i>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(235, 219, 178)
    font_size = 72
    font_family = monospace
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgb(168, 153, 132)
    font_size = 18
    font_family = monospace
    position = 0, 60
    halign = center
    valign = center
}
